name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Create .env.test
        run: |
          cat <<EOF > .env.test
          WP_URL=${{ secrets.WP_URL }}
          WP_USERNAME=${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD=${{ secrets.WP_APP_PASSWORD }}
          EOF
      - run: npm run test:integration

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Create .env
        run: |
          cat <<EOF > .env
          WP_URL=${{ secrets.WP_URL }}
          WP_USERNAME=${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD=${{ secrets.WP_APP_PASSWORD }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          RUNPOD_API_KEY=${{ secrets.RUNPOD_API_KEY }}
          EOF
      - run: ./test/smoke.sh
      - name: Upload generated images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-output
          path: output/
          retention-days: 7

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit-tests, type-check, integration-tests, smoke-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build and push image
        run: |
          gcloud builds submit --tag "$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME" --project "$PROJECT_ID"
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: southamerica-east1
          REPO_NAME: kanario
          SERVICE_NAME: kanario-discord
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --no-cpu-throttling \
            --min-instances 0 \
            --max-instances 3 \
            --add-volume name=creds-vol,type=cloud-storage,bucket=kanario-credentials \
            --add-volume-mount volume=creds-vol,mount-path=/app/data
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: southamerica-east1
          REPO_NAME: kanario
          SERVICE_NAME: kanario-discord
