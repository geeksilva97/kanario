name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.filter.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$FILES"
          # Check if any non-doc file changed
          if echo "$FILES" | grep -qvE '^(README\.md|CLAUDE\.md|docs/|\.github/.*\.md)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Create .env.test
        run: |
          cat <<EOF > .env.test
          WP_URL=${{ secrets.WP_URL }}
          WP_USERNAME=${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD=${{ secrets.WP_APP_PASSWORD }}
          WP_PUBLISHED_POST_ID=${{ secrets.WP_PUBLISHED_POST_ID }}
          WP_DRAFT_POST_ID=${{ secrets.WP_DRAFT_POST_ID }}
          EOF
      - run: npm run test:integration

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Create .env
        run: |
          cat <<EOF > .env
          WP_URL=${{ secrets.WP_URL }}
          WP_USERNAME=${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD=${{ secrets.WP_APP_PASSWORD }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          RUNPOD_API_KEY=${{ secrets.RUNPOD_API_KEY }}
          EOF
      - run: ./test/smoke.sh
      - name: Upload generated images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-output
          path: output/
          retention-days: 7

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.should_deploy == 'true'
    needs: [changes, unit-tests, type-check, integration-tests, smoke-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet
        env:
          REGION: ${{ secrets.GCP_REGION }}
      - name: Build and push image
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          REPO_NAME: kanario
          SERVICE_NAME: kanario-discord
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --no-cpu-throttling \
            --min-instances 1 \
            --max-instances 3 \
            --add-volume name=creds-vol,type=cloud-storage,bucket="$GCS_CREDENTIALS_BUCKET" \
            --add-volume-mount volume=creds-vol,mount-path=/app/data
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          REPO_NAME: kanario
          SERVICE_NAME: kanario-discord
          GCS_CREDENTIALS_BUCKET: ${{ secrets.GCS_CREDENTIALS_BUCKET }}
